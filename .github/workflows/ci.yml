name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

env:
  REGISTRY: ghcr.io
  # GHCR requires a lowercase image name.
  IMAGE_NAME: ysalitrynskyi/keymano

jobs:
  core:
    name: Rust core (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy -p keylayout-core -p keymano-session --all-targets -- -D warnings
      - name: Test
        run: cargo test -p keylayout-core -p keymano-session
      - name: Coverage gate (core >= 90%)
        run: |
          cargo install cargo-llvm-cov --locked || true
          rustup component add llvm-tools-preview
          cargo llvm-cov -p keylayout-core --fail-under-lines 90

  frontend:
    name: Frontend (tsc, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm exec tsc -b
      - name: Unit tests + coverage
        run: pnpm test
      - name: Build
        run: pnpm build

  tauri:
    name: Tauri build (matrix)
    # Compile-check on main/PRs only. Tagged releases build + upload real
    # bundles in the desktop-release jobs below, so don't double-build here.
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    strategy:
      fail-fast: false
      matrix:
        # x86_64 + arm64 so an arch-specific break is caught before a release.
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest, windows-11-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install Linux WebView deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: pnpm install --frozen-lockfile
      # macOS: build the .app only — the .dmg step needs a GUI/Finder and is
      # unreliable on headless runners. Windows/Linux build their defaults.
      - name: Build app (macOS)
        if: matrix.os == 'macos-latest'
        run: pnpm tauri build --bundles app
      - name: Build app (Windows/Linux)
        if: matrix.os != 'macos-latest'
        run: pnpm tauri build

  # Web image → GHCR. Published on every push to main as :latest (+ commit sha),
  # gated behind the core+frontend checks. Deploy with docker-compose.prod.yml.
  docker:
    name: Web image → GHCR (latest)
    runs-on: ubuntu-latest
    # Publish :latest only after the full check surface is green — core + the
    # frontend gate AND the 3-OS Tauri compile matrix (which runs on main).
    needs: [core, frontend, tauri]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web-prod.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # Tagged release (v*): push the versioned web image to GHCR. The GitHub
  # Release itself is owned by the desktop-release jobs below.
  docker-release:
    name: Web image → GHCR (tagged)
    runs-on: ubuntu-latest
    needs: [core, frontend]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Don't move :latest onto a prerelease tag (vX.Y.Z-rc1). Prereleases
            # still publish their full version, but :latest stays on the most
            # recent stable build (matches the prerelease handling in
            # create-release below and GitHub's own "Latest release" semantics).
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web-prod.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # ── Desktop release (tagged v*) ────────────────────────────────────────────
  # Canonical Tauri multi-platform flow: create a draft Release with a curated
  # body + autogenerated notes → build every OS and upload its bundles to that
  # draft → publish the draft once all builds succeed.

  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    needs: [core, frontend]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.mk.outputs.release_id }}
    steps:
      - id: mk
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const version = tag.replace(/^v/, '');
            const image = `ghcr.io/${context.repo.owner.toLowerCase()}/${context.repo.repo.toLowerCase()}`;
            const body = [
              `## Keymano ${tag}`,
              ``,
              `Cross-platform editor for macOS \`.keylayout\` files and \`.bundle\` packages.`,
              ``,
              `### Downloads`,
              `- **macOS** — \`.dmg\` (universal: Apple Silicon + Intel). Unsigned: right-click → **Open** on first launch, or \`xattr -dr com.apple.quarantine /Applications/Keymano.app\`.`,
              `- **Windows** — \`.msi\` or \`.exe\` installer (x86_64 + arm64).`,
              `- **Linux** — \`.deb\` or \`.AppImage\` (x86_64 + arm64).`,
              ``,
              `### Run in the browser / self-host`,
              `- Hosted: https://keymano.ys.contact`,
              `- Image: \`docker pull ${image}:${version}\` (see \`docker-compose.prod.yml\`)`,
              ``,
            ].join('\n');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Keymano ${tag}`,
              body,
              draft: true,
              prerelease: ${{ contains(github.ref, '-') }},
              generate_release_notes: true,
            });
            core.setOutput('release_id', data.id);

  build-desktop:
    name: Desktop bundle (${{ matrix.os }})
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS universal binary covers Apple Silicon + Intel in one .dmg.
          - os: macos-latest
            args: "--target universal-apple-darwin"
          # Linux x86_64 + arm64 (native arm runner) → .deb / .AppImage each.
          - os: ubuntu-latest
            args: "--bundles deb,appimage"
          - os: ubuntu-24.04-arm
            args: "--bundles deb,appimage"
          # Windows x86_64 + arm64 (native arm runner) → .msi / .exe each.
          - os: windows-latest
            args: ""
          - os: windows-11-arm
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Add macOS universal targets
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install Linux WebView deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: pnpm install --frozen-lockfile
      - name: Build + upload bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false
          retryAttempts: 2
          args: ${{ matrix.args }}

  publish-release:
    name: Publish release
    needs: [create-release, build-desktop]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            // Publishing a non-prerelease auto-marks it "latest"; don't force
            // make_latest (it would be wrong for prerelease tags).
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
