# Keymano static SPA — nginx server block.
# Replaces nginx:alpine's stock /etc/nginx/conf.d/default.conf.

server {
    listen      80;
    listen      [::]:80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Don't leak the nginx version.
    server_tokens off;

    # This is a static SPA — it never accepts uploads (files are read in the
    # browser, never sent to the server). Cap request bodies hard so a hostile
    # client can't stream a huge POST that nginx would buffer to its temp dir
    # and fill the disk; oversized requests get 413 immediately. Keep the body
    # buffer in memory (no on-disk temp file for anything under the cap).
    client_max_body_size 1m;
    client_body_buffer_size 1m;

    # Compression for text assets.
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml application/wasm font/woff2;

    # Baseline security headers. The hosted SPA is pure static (no inline
    # scripts; JSON-LD <script type="application/ld+json"> is CSP-exempt as
    # data) so a strict same-origin CSP holds — matches the Tauri desktop CSP
    # but adapted for the browser (no asset:/ipc: schemes here).
    #
    # 'wasm-unsafe-eval' is required in script-src: the browser build runs the
    # Rust core compiled to WebAssembly, and every WebAssembly.compile/
    # instantiate* call is gated by CSP. This keyword permits *only* wasm
    # compilation — it does NOT enable JS eval() (that needs 'unsafe-eval',
    # which stays blocked). Without it the wasm core fails to load and the
    # browser backend is dead.
    #
    # The __CSP_*_EXTRA__ tokens are substituted at container startup by
    # docker/docker-entrypoint.sh: empty (the default — same-origin) or, when
    # GA_MEASUREMENT_ID / CLOUDFLARE_WEB_ANALYTICS is set, the respective
    # analytics origins. This file is a TEMPLATE; the entrypoint renders it to
    # the real conf each start.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' __CSP_SCRIPT_EXTRA__; style-src 'self' 'unsafe-inline'; img-src 'self' data: __CSP_IMG_EXTRA__; font-src 'self' data:; connect-src 'self' __CSP_CONNECT_EXTRA__; manifest-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; object-src 'none'"
        always;

    # Container + tunnel health probe.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Correct MIME for the PWA manifest (not in nginx's default mime.types).
    location = /site.webmanifest {
        default_type application/manifest+json;
    }

    # Hashed build assets are immutable — cache hard. nginx replaces the
    # parent's add_header set when a location declares its own, so re-emit the
    # security headers here too (otherwise asset responses ship with no
    # X-Content-Type-Options, defeating MIME-sniff protection on JS/CSS).
    location /assets/ {
        add_header Cache-Control          "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options        "SAMEORIGIN" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        try_files  $uri =404;
    }

    # SPA: every other path falls back to index.html (no server-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
