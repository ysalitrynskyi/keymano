<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2e2014"/>
      <stop offset="55%" stop-color="#1b120b"/>
      <stop offset="100%" stop-color="#0e0905"/>
    </linearGradient>

    <linearGradient id="plate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#271810"/>
      <stop offset="100%" stop-color="#110b06"/>
    </linearGradient>

    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0ad53"/>
      <stop offset="100%" stop-color="#d96f1f"/>
    </linearGradient>

    <!-- dim, embossed keycap (not bright) -->
    <linearGradient id="keycap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3c2c1c"/>
      <stop offset="100%" stop-color="#241a10"/>
    </linearGradient>

    <!-- caps fade out toward the border -->
    <radialGradient id="fade" cx="50%" cy="52%" r="52%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="48%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <mask id="fadeMask" maskContentUnits="userSpaceOnUse">
      <rect x="0" y="0" width="100" height="100" fill="url(#fade)"/>
    </mask>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="72" y="72" width="880" height="880" rx="210" fill="url(#bg)"/>
  <rect x="72" y="72" width="880" height="880" rx="210" fill="none" stroke="#f0ad53" stroke-opacity="0.14" stroke-width="4"/>

  <circle cx="512" cy="512" r="310" fill="#ff9f2e" opacity="0.03" filter="url(#softGlow)"/>

  <g transform="translate(112 112) scale(8)">
    <!-- dim embossed keys, faded near the border -->
    <g mask="url(#fadeMask)" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="800" text-anchor="middle" fill="#8a7048">
      <g transform="translate(12 14) rotate(-13)"><rect x="-10" y="-10" width="20" height="20" rx="4.4" fill="url(#keycap)"/><text x="0" y="3.3" font-size="9.5">Q</text></g>
      <g transform="translate(31 14) rotate(8)"><rect x="-9" y="-9" width="18" height="18" rx="4" fill="url(#keycap)"/><text x="0" y="3" font-size="8.5">W</text></g>
      <g transform="translate(50 15) rotate(-4)"><rect x="-8.5" y="-8.5" width="17" height="17" rx="3.8" fill="url(#keycap)"/><text x="0" y="2.9" font-size="8.2">⌥</text></g>
      <g transform="translate(69 14) rotate(-8)"><rect x="-9" y="-9" width="18" height="18" rx="4" fill="url(#keycap)"/><text x="0" y="3" font-size="8.5">E</text></g>
      <g transform="translate(90 18) rotate(12)"><rect x="-10" y="-10" width="20" height="20" rx="4.4" fill="url(#keycap)"/><text x="0" y="3.3" font-size="9.5">R</text></g>
      <g transform="translate(7 45) rotate(-8)"><rect x="-9" y="-9" width="18" height="18" rx="4" fill="url(#keycap)"/><text x="0" y="3" font-size="8.5">A</text></g>
      <g transform="translate(94 48) rotate(9)"><rect x="-9" y="-9" width="18" height="18" rx="4" fill="url(#keycap)"/><text x="0" y="3" font-size="8.5">S</text></g>
      <g transform="translate(14 82) rotate(11)"><rect x="-10" y="-10" width="20" height="20" rx="4.4" fill="url(#keycap)"/><text x="0" y="3.3" font-size="9.5">Z</text></g>
      <g transform="translate(34 90) rotate(-9)"><rect x="-9" y="-9" width="18" height="18" rx="4" fill="url(#keycap)"/><text x="0" y="3" font-size="8.5">X</text></g>
      <g transform="translate(50 91) rotate(3)"><rect x="-8.5" y="-8.5" width="17" height="17" rx="3.8" fill="url(#keycap)"/><text x="0" y="2.9" font-size="8">⏎</text></g>
      <g transform="translate(69 90) rotate(7)"><rect x="-9" y="-9" width="18" height="18" rx="4" fill="url(#keycap)"/><text x="0" y="3" font-size="8.5">C</text></g>
      <g transform="translate(91 78) rotate(-11)"><rect x="-10.5" y="-10.5" width="21" height="21" rx="4.8" fill="url(#keycap)"/><text x="0" y="4" font-size="11.2">⌘</text></g>
    </g>

    <g>
      <rect x="13" y="29" width="74" height="44" rx="10" fill="url(#plate)" stroke="url(#orange)" stroke-width="3"/>
      <rect x="20" y="36" width="60" height="3" rx="1.5" fill="#f0ad53" opacity="0.22"/>

      <g fill="url(#orange)">
        <rect x="24" y="42" width="8" height="7" rx="2"/>
        <rect x="34" y="42" width="8" height="7" rx="2"/>
        <rect x="44" y="42" width="8" height="7" rx="2"/>
        <rect x="54" y="42" width="8" height="7" rx="2"/>
        <rect x="64" y="42" width="8" height="7" rx="2"/>
        <rect x="29" y="52" width="8" height="7" rx="2"/>
        <rect x="39" y="52" width="8" height="7" rx="2"/>
        <rect x="49" y="52" width="8" height="7" rx="2"/>
        <rect x="59" y="52" width="8" height="7" rx="2"/>
        <rect x="36" y="62" width="28" height="7" rx="2"/>
      </g>
    </g>
  </g>
</svg>
