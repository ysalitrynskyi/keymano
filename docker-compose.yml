# Keymano dev/test/deploy orchestration.
#
# The Tauri DESKTOP app needs a system WebView (WebKitGTK on Linux) and is built
# natively per-OS (`pnpm tauri build`) or in CI — not in Docker. But the full
# web app and every test run here:
#   - `web`       : UI dev server with the Rust core compiled to WebAssembly
#   - `web-prod`  : production static build served by nginx (deployable anywhere)
#   - `web-test`  : frontend unit tests (vitest)
#   - `check`     : eslint + TypeScript typecheck
#   - `core-test` : pure Rust core + session crate tests
#
# Usage:
#   docker compose up web                 # dev UI at http://localhost:1420
#   docker compose up web-prod            # prod UI  at http://localhost:8080
#   docker compose run --rm web-test      # vitest
#   docker compose run --rm check         # lint + tsc
#   docker compose run --rm core-test     # cargo tests
#
# Desktop builds (outside Docker):
#   macOS:   pnpm tauri build --bundles app|dmg
#   Windows: pnpm tauri build              (MSVC toolchain + WebView2)
#   Linux:   pnpm tauri build              (WebKitGTK + libsoup dev packages)

services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "1420:1420"
    volumes:
      - ./src:/app/src
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
    command: ["pnpm", "dev", "--host", "0.0.0.0"]

  web-prod:
    build:
      context: .
      dockerfile: docker/web-prod.Dockerfile
    ports:
      - "8080:80"

  web-test:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    command: ["pnpm", "test"]

  check:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    command: ["sh", "-c", "pnpm lint && pnpm exec tsc -b"]

  core-test:
    build:
      context: .
      dockerfile: docker/core.Dockerfile
    command: ["cargo", "test", "-p", "keylayout-core", "-p", "keymano-session"]
